name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # tests type-check against the build output, so build first
      - run: pnpm run build

      - run: pnpm exec tsc --noEmit

      - run: pnpm exec eslint src --max-warnings=0

      - run: pnpm exec prettier --check src tests

      - run: pnpm exec node --test --experimental-transform-types "tests/*.test.ts"
